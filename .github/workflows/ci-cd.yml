name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: docker-auditor

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - run: npm run lint

      - run: npm run type-check

      - run: npm run build

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - run: pip install pytest pytest-asyncio httpx

      - run: python -m pytest tests/ -v --tb=short
        env:
          AWS_DEFAULT_REGION: us-east-1
          COGNITO_USER_POOL_ID: us-east-1_test
          COGNITO_CLIENT_ID: test-client-id
          DYNAMODB_SCAN_JOBS_TABLE: test-scan-jobs
          DYNAMODB_SCAN_RESULTS_TABLE: test-scan-results
          DYNAMODB_CONNECTIONS_TABLE: test-connections
          DYNAMODB_WS_CONNECTIONS_TABLE: test-ws-connections
          DYNAMODB_EVAL_RESULTS_TABLE: test-eval-results
          DYNAMODB_CHAT_HISTORY_TABLE: test-chat-history
          SQS_SCAN_JOBS_URL: https://sqs.us-east-1.amazonaws.com/000000000000/test.fifo
          S3_SCAN_REPORTS_BUCKET: test-scan-reports
          S3_EVAL_REPORTS_BUCKET: test-eval-reports
          REDIS_URL: redis://localhost:6379
          SES_FROM_EMAIL: test@example.com
          SECRET_PREFIX: test/dev
          FRONTEND_URL: https://test.example.com
          WEBSOCKET_API_ENDPOINT: https://test.execute-api.us-east-1.amazonaws.com/test

  test-worker:
    name: Worker Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: worker/requirements.txt

      - run: pip install -r requirements.txt

      - run: pip install pytest pytest-asyncio

      - run: python -m pytest tests/ -v --tb=short
        env:
          AWS_DEFAULT_REGION: us-east-1
          DYNAMODB_SCAN_JOBS_TABLE: test-scan-jobs
          DYNAMODB_SCAN_RESULTS_TABLE: test-scan-results
          DYNAMODB_WS_CONNECTIONS_TABLE: test-ws-connections
          DYNAMODB_EVAL_RESULTS_TABLE: test-eval-results
          DYNAMODB_CHAT_HISTORY_TABLE: test-chat-history
          SQS_SCAN_JOBS_URL: https://sqs.us-east-1.amazonaws.com/000000000000/test.fifo
          S3_SCAN_REPORTS_BUCKET: test-scan-reports
          S3_EVAL_REPORTS_BUCKET: test-eval-reports
          REDIS_URL: redis://localhost:6379
          TRIVY_LAMBDA_FUNCTION_NAME: test-trivy
          WEBSOCKET_API_ENDPOINT: https://test.execute-api.us-east-1.amazonaws.com/test
          SES_FROM_EMAIL: test@example.com
          OPENAI_API_KEY_SECRET_NAME: test/openai
          LANGSMITH_API_KEY_SECRET_NAME: test/langsmith

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend, test-worker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      id-token: write
      contents: read
    outputs:
      frontend_tag: ${{ steps.meta.outputs.frontend_tag }}
      backend_tag: ${{ steps.meta.outputs.backend_tag }}
      worker_tag: ${{ steps.meta.outputs.worker_tag }}
      environment: ${{ steps.meta.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SHA_SHORT=${GITHUB_SHA::8}
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV=dev
          else
            ENV=dev
          fi
          echo "frontend_tag=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "backend_tag=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "worker_tag=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set ECR registry
        run: echo "ECR_REGISTRY=${{ steps.ecr-login.outputs.registry }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-${{ steps.meta.outputs.environment }}-frontend:${{ steps.meta.outputs.frontend_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-${{ steps.meta.outputs.environment }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-${{ steps.meta.outputs.environment }}-backend:${{ steps.meta.outputs.backend_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-${{ steps.meta.outputs.environment }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-${{ steps.meta.outputs.environment }}-worker:${{ steps.meta.outputs.worker_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-${{ steps.meta.outputs.environment }}-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment: ${{ needs.build-and-push.outputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set environment variables
        run: |
          ENV=${{ needs.build-and-push.outputs.environment }}
          ECR_REGISTRY=${{ steps.ecr-login.outputs.registry }}
          FRONTEND_TAG=${{ needs.build-and-push.outputs.frontend_tag }}
          BACKEND_TAG=${{ needs.build-and-push.outputs.backend_tag }}
          WORKER_TAG=${{ needs.build-and-push.outputs.worker_tag }}
          CLUSTER="${{ env.PROJECT_NAME }}-${ENV}"
          echo "CLUSTER=${CLUSTER}" >> "$GITHUB_ENV"
          echo "ENV=${ENV}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${ECR_REGISTRY}/${PROJECT_NAME}-${ENV}-frontend:${FRONTEND_TAG}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=${ECR_REGISTRY}/${PROJECT_NAME}-${ENV}-backend:${BACKEND_TAG}" >> "$GITHUB_ENV"
          echo "WORKER_IMAGE=${ECR_REGISTRY}/${PROJECT_NAME}-${ENV}-worker:${WORKER_TAG}" >> "$GITHUB_ENV"

      - name: Deploy frontend
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.PROJECT_NAME }}-${{ env.ENV }}-frontend \
            --query 'taskDefinition' --output json)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMAGE "${{ env.FRONTEND_IMAGE }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster ${{ env.CLUSTER }} \
            --service ${{ env.PROJECT_NAME }}-${{ env.ENV }}-frontend \
            --task-definition "$NEW_ARN" \
            --force-new-deployment

      - name: Deploy backend
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.PROJECT_NAME }}-${{ env.ENV }}-backend \
            --query 'taskDefinition' --output json)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMAGE "${{ env.BACKEND_IMAGE }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster ${{ env.CLUSTER }} \
            --service ${{ env.PROJECT_NAME }}-${{ env.ENV }}-backend \
            --task-definition "$NEW_ARN" \
            --force-new-deployment

      - name: Deploy worker
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.PROJECT_NAME }}-${{ env.ENV }}-worker \
            --query 'taskDefinition' --output json)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMAGE "${{ env.WORKER_IMAGE }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster ${{ env.CLUSTER }} \
            --service ${{ env.PROJECT_NAME }}-${{ env.ENV }}-worker \
            --task-definition "$NEW_ARN" \
            --force-new-deployment

      - name: Wait for frontend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.CLUSTER }} \
            --services ${{ env.PROJECT_NAME }}-${{ env.ENV }}-frontend

      - name: Wait for backend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.CLUSTER }} \
            --services ${{ env.PROJECT_NAME }}-${{ env.ENV }}-backend

      - name: Wait for worker deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.CLUSTER }} \
            --services ${{ env.PROJECT_NAME }}-${{ env.ENV }}-worker
